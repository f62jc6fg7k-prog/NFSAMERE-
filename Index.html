<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NFSAMERE">
<meta name="theme-color" content="#0d0f14">
<title>NFSAMERE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;background:#0d0f14}
body{touch-action:manipulation}
:root{
  --bg:#0d0f14;--surface:#161920;--border:#252932;
  --accent:#ff2d2d;--accent2:#47b8ff;--accent3:#a78bfa;
  --danger:#ff4f4f;--success:#4fffb0;--text:#f0f2f5;--muted:#6b7280;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue','Inter',system-ui,sans-serif;
  --font-display:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','Inter',sans-serif;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
  --safe-l:env(safe-area-inset-left);--safe-r:env(safe-area-inset-right);
  --sidebar-w:260px;--content-max:740px;--nav-h:56px
}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
button{-webkit-user-select:none;user-select:none;touch-action:manipulation}
input,textarea{font-size:16px!important}

/* ── ROOT ── */
#qroot{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;-webkit-font-smoothing:antialiased}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--safe-top)) 20px 10px 20px;border-bottom:1px solid var(--border);background:rgba(13,15,20,0.9);flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);min-height:var(--nav-h)}
.nav-logo{font-family:var(--font-display);font-size:1.3rem;font-weight:800;letter-spacing:-0.04em;white-space:nowrap}
.nav-logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 16px;border-radius:9px;border:1px solid transparent;background:none;color:var(--muted);font-family:var(--font);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:-0.01em;white-space:nowrap;min-height:36px}
@media(hover:hover){.nav-tab:hover{color:var(--text);border-color:var(--border)}}
.nav-tab:active{opacity:0.7}
.nav-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── SCROLL CONTAINER ── */
#main-content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--safe-bot);-webkit-overflow-scrolling:touch}

/* ── HOME ── */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:48px 20px 36px;text-align:center}
.home-title{font-family:var(--font-display);font-size:clamp(3rem,10vw,5.5rem);font-weight:800;letter-spacing:-0.05em;line-height:1}
.home-title em{color:var(--accent);font-style:normal}
.home-subtitle{color:var(--muted);font-size:0.92rem;max-width:520px;line-height:1.6;font-weight:400}
.home-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px;flex:1 1 160px;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);text-align:left}
@media(hover:hover){.mode-card:hover{transform:translateY(-5px) scale(1.02);border-color:var(--accent);box-shadow:0 16px 48px rgba(255,45,45,0.18)}}
.mode-card:active{transform:scale(0.97);border-color:var(--accent)}
.mode-icon{font-size:1.6rem;margin-bottom:10px}
.mode-title{font-size:0.92rem;font-weight:700;margin-bottom:5px;letter-spacing:-0.02em}
.mode-desc{font-size:0.72rem;color:var(--muted);line-height:1.5;font-weight:400}
.mode-badge{display:inline-block;margin-top:10px;padding:4px 10px;border-radius:100px;font-size:0.62rem;font-weight:600}
.mode-card.exam .mode-badge{background:rgba(255,45,45,0.12);color:var(--accent)}
.mode-card.training .mode-badge{background:rgba(71,184,255,0.12);color:var(--accent2)}
.stats-row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--accent);letter-spacing:-0.05em}
.stat-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;font-weight:500}
.sessions-grid{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:520px}
.session-chip{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.72rem;font-weight:600;letter-spacing:-0.01em}

/* ── BUTTONS ── */
.btn{padding:11px 20px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font);font-weight:600;font-size:0.88rem;transition:all .2s;letter-spacing:-0.01em;min-height:42px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:scale(0.96);opacity:0.85}
.btn-primary{background:var(--accent);color:#fff}
@media(hover:hover){.btn-primary:hover{background:#ff5555}}
.btn-success{background:var(--success);color:#0d0f14}
.btn-danger{background:rgba(255,79,79,0.12);color:var(--danger);border:1px solid rgba(255,79,79,0.25)}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
@media(hover:hover){.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}}
.btn-sm{padding:7px 14px;font-size:0.77rem;min-height:34px}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* ── EDITOR ── */
.editor{max-width:900px;margin:0 auto;padding:24px 20px;width:100%}
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.editor-title{font-size:1.05rem;font-weight:700;letter-spacing:-0.03em}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px}
.q-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.q-num{font-size:0.65rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}
.q-field{margin-bottom:8px}
.q-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;display:block;font-weight:500}
.q-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none;transition:border-color .2s;resize:vertical}
.q-input:focus{border-color:var(--accent)}
.q-input.correct{border-left:3px solid var(--success)}
.q-input.wrong{border-left:3px solid var(--danger)}
.q-fields{display:grid;grid-template-columns:1fr;gap:6px;margin-top:6px}
@media(min-width:640px){.q-fields{grid-template-columns:1fr 1fr}}
.add-card{border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;cursor:pointer;color:var(--muted);font-size:0.9rem;transition:all .2s;margin-bottom:10px;background:none;width:100%;font-family:var(--font);font-weight:500;min-height:52px}
@media(hover:hover){.add-card:hover{border-color:var(--accent);color:var(--accent)}}
.add-card:active{border-color:var(--accent);color:var(--accent)}

/* ── QUIZ LAYOUT (mobile first) ── */
.quiz-wrap{max-width:var(--content-max);margin:0 auto;padding:16px 16px 24px;width:100%}
.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.quiz-progress-bar{flex:1;height:5px;background:var(--border);border-radius:100px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ff6b6b);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.quiz-counter{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);white-space:nowrap}
.quiz-score-live{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent2);font-weight:600;white-space:nowrap}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px 18px;margin-bottom:14px}
.question-text{font-size:1rem;font-weight:600;line-height:1.55;margin-bottom:16px;letter-spacing:-0.02em}
.choices{display:flex;flex-direction:column;gap:9px}
.choice-btn{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:0.9rem;font-weight:500;cursor:pointer;text-align:left;transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:flex-start;gap:11px;letter-spacing:-0.01em;min-height:56px}
@media(hover:hover){.choice-btn:hover:not(:disabled){border-color:var(--accent2);background:rgba(71,184,255,0.06)}}
.choice-btn:not(:disabled):active{transform:scale(0.98)}
.choice-btn.selected-exam{border-color:var(--accent2);background:rgba(71,184,255,0.12);color:var(--accent2)}
.choice-btn.selected-wrong{border-color:var(--danger);background:rgba(255,79,79,0.1);color:var(--danger)}
.choice-btn.reveal-correct{border-color:var(--success);background:rgba(79,255,176,0.1)}
.choice-btn:disabled{cursor:default}
.choice-index{width:24px;height:24px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-family:'DM Mono',monospace;flex-shrink:0;margin-top:1px;font-weight:700}
.feedback{padding:11px 15px;border-radius:11px;font-weight:600;margin-top:10px;display:flex;align-items:flex-start;gap:9px;font-size:0.84rem;line-height:1.45;animation:feedbackIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes feedbackIn{from{opacity:0;transform:scale(0.95) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.feedback.correct{background:rgba(79,255,176,0.1);border:1px solid rgba(79,255,176,0.25);color:var(--success)}
.feedback.wrong{background:rgba(255,79,79,0.1);border:1px solid rgba(255,79,79,0.25);color:var(--danger)}
.quiz-nav{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px}
.kbd-hint{font-size:0.62rem;color:var(--muted);opacity:0.6;align-self:center;font-family:'DM Mono',monospace;display:none}

/* ── RESULTS ── */
.results{max-width:760px;margin:0 auto;padding:20px 16px 32px;width:100%}
.results-hero{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:26px;text-align:center;margin-bottom:14px}
.results-score{font-size:clamp(2.4rem,7vw,4rem);font-weight:800;color:var(--accent);letter-spacing:-0.06em}
.results-total{font-size:0.84rem;color:var(--muted);margin-top:4px;font-weight:400}
.results-pct{font-size:1.15rem;font-weight:700;margin-top:6px;letter-spacing:-0.03em}
.results-grid{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.results-stat{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;min-width:80px}
.results-stat-num{font-size:1.2rem;font-weight:800;letter-spacing:-0.04em}
.results-stat-num.green{color:var(--success)}
.results-stat-num.red{color:var(--danger)}
.results-stat-label{font-size:0.63rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.correction-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.correction-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 14px;display:flex;gap:10px}
.correction-icon{font-size:0.84rem;flex-shrink:0;margin-top:2px}
.correction-q{font-weight:600;font-size:0.8rem;margin-bottom:3px;letter-spacing:-0.02em}
.correction-answer{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.45}
.correction-answer .good{color:var(--success)}
.correction-answer .bad{color:var(--danger)}
.correction-section-title{font-size:0.82rem;font-weight:700;margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.exam-dots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.dot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:0.7rem;font-family:'DM Mono',monospace;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
@media(hover:hover){.dot:hover{border-color:var(--accent);color:var(--accent)}}
.dot:active{transform:scale(0.9)}
.dot.answered{background:rgba(71,184,255,0.1);border-color:rgba(71,184,255,0.4);color:var(--accent2)}
.dot.skipped-dot{background:rgba(107,114,128,0.08);border-color:rgba(107,114,128,0.25)}
.dot.current{border-color:var(--accent);background:var(--accent);color:#0d0f14;font-weight:700}
.exam-info{font-size:0.73rem;color:var(--muted);text-align:center;margin-bottom:12px;padding:9px 13px;background:rgba(71,184,255,0.06);border:1px solid rgba(71,184,255,0.12);border-radius:10px}
.cat-badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:rgba(167,139,250,0.12);color:var(--accent3)}
.session-badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:0.62rem;font-weight:600;letter-spacing:.04em;background:rgba(71,184,255,0.1);color:var(--accent2);margin-left:5px}

/* ── FILTERS ── */
.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:14px}
.filter-title{font-size:0.66rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.cat-pill{padding:6px 13px;border-radius:100px;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:var(--font);font-size:0.73rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
@media(hover:hover){.cat-pill:hover{border-color:var(--accent2);color:var(--accent2)}}
.cat-pill:active{transform:scale(0.95)}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.session-pill.active{background:var(--accent3);border-color:var(--accent3);color:#fff}
@media(hover:hover){.session-pill:hover{border-color:var(--accent3);color:var(--accent3)}}

/* ── EMOJI PARTICLE ── */
.emoji-particle{position:fixed;pointer-events:none;z-index:9998;animation:emojifall linear forwards}
@keyframes emojifall{0%{transform:translateY(-60px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ════════════════════════════════════════════════
   TABLET/DESKTOP LAYOUT ≥ 768px
   ════════════════════════════════════════════════ */
@media(min-width:768px){
  :root{--nav-h:60px}
  .nav{padding:calc(12px + var(--safe-top)) 32px 12px}
  .nav-logo{font-size:1.4rem}
  .nav-tab{font-size:0.86rem;padding:9px 20px}
  .home{gap:36px;padding:60px 40px 48px}
  .home-cards{max-width:560px;gap:18px}
  .mode-card{flex:1 1 160px;padding:28px 24px}
  .stats-row{gap:40px}
  .stat-num{font-size:2.2rem}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .choice-btn{font-size:0.88rem;min-height:56px}
  .question-text{font-size:1.08rem}
  .kbd-hint{display:block}
  .results{padding:28px 32px 44px;max-width:760px}
  .editor{padding:28px 32px}
  .q-fields{grid-template-columns:1fr 1fr}
}

/* ════════════════════════════════════════════════
   SMALL MOBILE ≤ 390px (iPhone SE/mini)
   ════════════════════════════════════════════════ */
@media(max-width:390px){
  .nav{padding:calc(8px + var(--safe-top)) 12px 8px}
  .home{padding:28px 12px}
  .home-title{font-size:clamp(2.4rem,12vw,3.2rem)}
  .mode-card{flex:1 1 100%}
  .quiz-wrap,.results,.editor{padding-left:12px;padding-right:12px}
  .question-card{padding:16px 13px}
  .nav-tab{padding:7px 11px;font-size:0.75rem}
  .choice-btn{padding:13px 13px;font-size:0.85rem}
  .dot{width:26px;height:26px;font-size:0.65rem}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
@supports(color-scheme:dark){:root{color-scheme:dark}}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="qroot">
  <nav class="nav">
    <div class="nav-logo">NFS<span>AMERE</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="goHome()">Accueil</button>
      <button class="nav-tab" onclick="goExam()">Examen</button>
      <button class="nav-tab" onclick="goTraining()">Entraînement</button>
      <button class="nav-tab" onclick="goEditor()">Éditeur</button>
    </div>
  </nav>
  <div id="main-content"></div>
</div>
<script>
const AC=new (window.AudioContext||window.webkitAudioContext)();
function playSuccess(){const t=AC.currentTime;[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.08);g.gain.linearRampToValueAtTime(0.18,t+i*0.08+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.18);o.start(t+i*0.08);o.stop(t+i*0.08+0.2);});}
function playBuzzer(){const t=AC.currentTime;const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.linearRampToValueAtTime(60,t+0.35);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.45);}
function resumeAudio(){if(AC.state==='suspended')AC.resume();}
const canvas=document.getElementById('confetti-canvas');
const ctx=canvas.getContext('2d');
let cparts=[],cAnimId=null;
function rsz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
function launchConfetti(){resumeAudio();for(let i=0;i<160;i++){const a=Math.random()*Math.PI*2,s=Math.random()*8+3;cparts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*0.3-20,vx:Math.cos(a)*s*(Math.random()*0.6+0.7),vy:Math.sin(a)*s*(Math.random()*0.6+0.7)-4,w:Math.random()*12+4,h:Math.random()*7+3,color:`hsl(${Math.random()*360},90%,65%)`,rot:Math.random()*360,vr:(Math.random()-0.5)*8,alpha:1,gravity:0.18+Math.random()*0.12,wobble:Math.random()*4,wobbleSpeed:Math.random()*0.08+0.03,wobbleAngle:Math.random()*Math.PI*2});}if(!cAnimId)animC();}
function animC(){ctx.clearRect(0,0,canvas.width,canvas.height);cparts=cparts.filter(p=>p.alpha>0.01&&p.y<canvas.height+50);cparts.forEach(p=>{p.wobbleAngle+=p.wobbleSpeed;p.vx+=Math.sin(p.wobbleAngle)*p.wobble*0.05;p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.alpha-=0.008;ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.beginPath();ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,2);ctx.fill();ctx.restore();});if(cparts.length>0){cAnimId=requestAnimationFrame(animC);}else{cAnimId=null;ctx.clearRect(0,0,canvas.width,canvas.height);}}

let questions=[...INIT_Q];
let selectedSessions=new Set(["Toutes"]);
let selectedCats=new Set(["Toutes"]);
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildChoices(q){return shuffle([{text:q.correct,isCorrect:true},{text:q.wrong1,isCorrect:false},{text:q.wrong2,isCorrect:false},{text:q.wrong3,isCorrect:false},{text:q.wrong4,isCorrect:false}]);}
function isValidQ(q){return !!(q.question&&q.correct&&q.wrong1&&q.wrong2&&q.wrong3&&q.wrong4&&q.wrong1!=='—')}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function setActive(t){document.querySelectorAll('.nav-tab').forEach((x,i)=>x.classList.toggle('active',i===t));}
function goHome(){setActive(0);renderHome();}
function goExam(){setActive(1);renderExam();}
function goTraining(){setActive(2);renderTraining();}
function goEditor(){setActive(3);renderEditor();}
function getFilteredQ(){
  return questions.filter(q=>{
    if(!isValidQ(q))return false;
    const sessOk=selectedSessions.has("Toutes")||selectedSessions.has(q.session);
    const catOk=selectedCats.has("Toutes")||selectedCats.has(q.cat);
    return sessOk&&catOk;
  });
}
function renderFilters(mode){
  const sess=["Toutes",...ALL_SESSIONS];
  const cats=["Toutes",...ALL_CATS];
  return `<div class="filter-section">
    <div class="filter-title">📅 Session</div>
    <div class="pill-row">${sess.map(s=>`<button class="cat-pill session-pill ${(s==="Toutes"&&selectedSessions.has("Toutes"))||(s!=="Toutes"&&selectedSessions.has(s))?'active':''}" onclick="toggleSession('${s.replace(/'/g,"\'")}','${mode}')">${s}</button>`).join('')}</div>
    <div class="filter-title" style="margin-top:10px">🗂️ Matière</div>
    <div class="pill-row">${cats.map(c=>`<button class="cat-pill ${(c==="Toutes"&&selectedCats.has("Toutes"))||(c!=="Toutes"&&selectedCats.has(c))?'active':''}" onclick="toggleCat('${c}','${mode}')">${c}</button>`).join('')}</div>
  </div>`;
}
window.toggleSession=(sess,mode)=>{
  if(sess==="Toutes"){selectedSessions=new Set(["Toutes"]);}
  else{selectedSessions.delete("Toutes");if(selectedSessions.has(sess))selectedSessions.delete(sess);else selectedSessions.add(sess);if(selectedSessions.size===0)selectedSessions=new Set(["Toutes"]);}
  if(mode==="exam")goExam();else if(mode==="training")goTraining();
};
window.toggleCat=(cat,mode)=>{
  if(cat==="Toutes"){selectedCats=new Set(["Toutes"]);}
  else{selectedCats.delete("Toutes");if(selectedCats.has(cat))selectedCats.delete(cat);else selectedCats.add(cat);if(selectedCats.size===0)selectedCats=new Set(["Toutes"]);}
  if(mode==="exam")goExam();else if(mode==="training")goTraining();
};

function renderEditor(){
  const el=document.getElementById('main-content');
  const render=()=>{
    el.innerHTML=`<div class="editor"><div class="editor-header"><div class="editor-title">✏️ ${questions.length} questions</div><button class="btn btn-ghost" onclick="goHome()">← Retour</button></div>${questions.map((q,i)=>`<div class="q-card"><div class="q-card-top"><span class="q-num">${esc(q.session||'')} · ${esc(q.cat||'—')} · #${i+1}</span><button class="btn btn-danger btn-sm" onclick="removeQ(${q.id})">Supprimer</button></div><div class="q-field"><label class="q-label">Intitulé</label><input class="q-input" value="${esc(q.question)}" oninput="updateQ(${q.id},'question',this.value)"/></div><div class="q-fields"><div class="q-field"><label class="q-label">✅ Bonne</label><input class="q-input correct" value="${esc(q.correct)}" oninput="updateQ(${q.id},'correct',this.value)"/></div><div class="q-field"><label class="q-label">❌ Mauvaise 1</label><input class="q-input wrong" value="${esc(q.wrong1)}" oninput="updateQ(${q.id},'wrong1',this.value)"/></div><div class="q-field"><label class="q-label">❌ Mauvaise 2</label><input class="q-input wrong" value="${esc(q.wrong2)}" oninput="updateQ(${q.id},'wrong2',this.value)"/></div><div class="q-field"><label class="q-label">❌ Mauvaise 3</label><input class="q-input wrong" value="${esc(q.wrong3)}" oninput="updateQ(${q.id},'wrong3',this.value)"/></div><div class="q-field"><label class="q-label">❌ Mauvaise 4</label><input class="q-input wrong" value="${esc(q.wrong4)}" oninput="updateQ(${q.id},'wrong4',this.value)"/></div></div></div>`).join('')}<button class="add-card" onclick="addQ()">+ Ajouter une question</button></div>`;
  };
  render();
  window.updateQ=(id,f,v)=>{questions=questions.map(q=>q.id===id?{...q,[f]:v}:q);};
  window.removeQ=(id)=>{questions=questions.filter(q=>q.id!==id);render();};
  window.addQ=()=>{questions=[...questions,{id:Date.now(),cat:'Divers',session:'Perso',question:'',correct:'',wrong1:'',wrong2:'',wrong3:'',wrong4:''}];render();};
}
function renderTraining(){
  const valid=shuffle(getFilteredQ());
  const el=document.getElementById('main-content');
  if(!valid.length){el.innerHTML=`<div class="quiz-wrap">${renderFilters('training')}<div style="text-align:center;padding-top:40px"><p style="color:var(--muted)">Aucune question pour ces filtres.</p><button class="btn btn-ghost" style="margin-top:16px" onclick="goHome()">← Retour</button></div></div>`;return;}
  let idx=0,answered=null,done=false,score={correct:0,wrong:0};
  const cm={};const gc=(i)=>{if(!cm[i])cm[i]=buildChoices(valid[i]);return cm[i];};
  const render=()=>{
    if(done){
      el.innerHTML=`<div class="results"><div class="results-hero"><div style="font-size:0.72rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Entraînement terminé</div><div class="results-score">${score.correct}/${valid.length}</div><div class="results-pct" style="color:${score.correct/valid.length>=0.7?'var(--success)':'var(--danger)'}">${Math.round(score.correct/valid.length*100)}%</div><div class="results-grid"><div class="results-stat"><div class="results-stat-num green">${score.correct}</div><div class="results-stat-label">Correctes</div></div><div class="results-stat"><div class="results-stat-num red">${score.wrong}</div><div class="results-stat-label">Fausses</div></div></div></div><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-primary" onclick="renderTraining()">Recommencer</button><button class="btn btn-ghost" onclick="goHome()">← Menu</button></div></div>`;
      if(score.correct/valid.length>=0.7){launchConfetti();playSuccess();}
      return;
    }
    const q=valid[idx];const ch=gc(idx);
    el.innerHTML=`<div class="quiz-wrap">${renderFilters('training')}<div class="quiz-header"><button class="btn btn-ghost btn-sm" onclick="goHome()">←</button><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${(idx/valid.length)*100}%"></div></div><div class="quiz-counter">${idx+1}/${valid.length}</div></div><div class="question-card"><div><span class="cat-badge">${esc(q.cat)}</span><span class="session-badge">${esc(q.session)}</span></div><div class="question-text">${esc(q.question)}</div><div class="choices">${ch.map((c,ci)=>{let cls='choice-btn';if(answered){if(c.isCorrect)cls+=' reveal-correct';else if(c.text===answered.selected&&!c.isCorrect)cls+=' selected-wrong';}return `<button class="${cls}" ${answered?'disabled':''} onclick="pickTrain(${ci})"><span class="choice-index">${String.fromCharCode(65+ci)}</span>${esc(c.text)}</button>`;}).join('')}</div>${answered?`<div class="feedback ${answered.correct?'correct':'wrong'}">${answered.correct?'✅ Bonne réponse !':'❌ Faux — '+esc(valid[idx].correct)}</div>`:''}</div><div class="quiz-nav">${answered?`<button class="btn btn-primary" onclick="nextTrain()">${idx+1<valid.length?'Suivante →':'Résultats'}</button>`:''}</div></div>`;
  };
  window.pickTrain=(ci)=>{if(answered)return;resumeAudio();const c=gc(idx)[ci];answered={selected:c.text,correct:c.isCorrect};score[c.isCorrect?'correct':'wrong']++;if(c.isCorrect){launchConfetti();playSuccess();}else{launchThumbsDown();playBuzzer();}render();};
  window.nextTrain=()=>{if(idx+1>=valid.length){done=true;render();return;}idx++;answered=null;render();};
  render();
}
function renderExam(){
  const valid=getFilteredQ();
  const COUNT=Math.min(100,valid.length);
  const el=document.getElementById('main-content');
  if(!COUNT){el.innerHTML=`<div class="quiz-wrap">${renderFilters('exam')}<div style="text-align:center;padding-top:40px"><p style="color:var(--muted)">Pas assez de questions.</p><button class="btn btn-ghost" style="margin-top:16px" onclick="goHome()">← Retour</button></div></div>`;return;}
  const examQ=shuffle(valid).slice(0,COUNT);
  const choices=examQ.map(q=>buildChoices(q));
  let answers=Array(COUNT).fill(null);
  let idx=0,submitted=false;
  const calcScore=()=>{let s=0;examQ.forEach((q,i)=>{const a=answers[i];if(!a||a==='__skipped__')return;s+=a===q.correct?1:-1;});return s;};
  const render=()=>{
    if(submitted){
      const sc=calcScore();
      const correct=examQ.filter((q,i)=>answers[i]===q.correct).length;
      const wrong=examQ.filter((q,i)=>answers[i]&&answers[i]!=='__skipped__'&&answers[i]!==q.correct).length;
      const skipped=examQ.filter((q,i)=>!answers[i]||answers[i]==='__skipped__').length;
      const pct=Math.round((correct/COUNT)*100);
      if(pct>=50){launchConfetti();playSuccess();}else{playBuzzer();}
      el.innerHTML=`<div class="results"><div class="results-hero"><div style="font-size:0.72rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Résultats</div><div class="results-score">${sc} pts</div><div class="results-total">sur ${COUNT} questions · ${pct}%</div><div class="results-pct" style="color:${pct>=50?'var(--success)':'var(--danger)'}">${pct>=50?'✅ Réussi':'❌ Échoué'}</div><div class="results-grid"><div class="results-stat"><div class="results-stat-num green">+${correct}</div><div class="results-stat-label">Justes</div></div><div class="results-stat"><div class="results-stat-num red">-${wrong}</div><div class="results-stat-label">Fausses</div></div><div class="results-stat"><div class="results-stat-num" style="color:var(--muted)">${skipped}</div><div class="results-stat-label">Passées</div></div></div></div><div class="correction-section-title">Correction</div><div class="correction-list">${examQ.map((q,i)=>{const a=answers[i];const ok=a===q.correct;const skip=!a||a==='__skipped__';return `<div class="correction-item"><div class="correction-icon">${skip?'⏭️':ok?'✅':'❌'}</div><div><div class="correction-q">[${esc(q.session)}·${esc(q.cat)}] ${esc(q.question)}</div><div class="correction-answer">${skip?`Passée · <span class="good">${esc(q.correct)}</span>`:`<span class="${ok?'good':'bad'}">${esc(a)}</span>${!ok?` · <span class="good">${esc(q.correct)}</span>`:''}`}</div></div></div>`;}).join('')}</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px"><button class="btn btn-primary" onclick="goExam()">Recommencer</button><button class="btn btn-ghost" onclick="goHome()">← Menu</button></div></div>`;return;
    }
    const q=examQ[idx];const qch=choices[idx];const ans=answers[idx];
    const ac=answers.filter(a=>a&&a!=='__skipped__').length;
    el.innerHTML=`<div class="quiz-wrap">${renderFilters('exam')}<div class="quiz-header"><button class="btn btn-ghost btn-sm" onclick="goHome()">←</button><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${(idx/COUNT)*100}%"></div></div><div class="quiz-counter">${idx+1}/${COUNT}</div><div class="quiz-score-live">${ac} rép.</div></div><div class="exam-info">💡 Réponses modifiables jusqu'à la fin</div><div class="exam-dots">${examQ.map((_,i)=>{let cls='dot';if(i===idx)cls+=' current';else if(answers[i]&&answers[i]!=='__skipped__')cls+=' answered';else if(answers[i]==='__skipped__')cls+=' skipped-dot';return `<div class="${cls}" onclick="jumpExam(${i})">${i+1}</div>`;}).join('')}</div><div class="question-card"><div><span class="cat-badge">${esc(q.cat)}</span><span class="session-badge">${esc(q.session)}</span></div><div class="question-text">${esc(q.question)}</div><div class="choices">${qch.map((c,ci)=>{let cls='choice-btn';if(ans===c.text)cls+=' selected-exam';return `<button class="${cls}" onclick="pickExam(${ci})"><span class="choice-index">${String.fromCharCode(65+ci)}</span>${esc(c.text)}</button>`;}).join('')}</div></div><div class="quiz-nav"><button class="btn btn-ghost" ${idx===0?'disabled':''} onclick="jumpExam(${idx-1})">← Préc.</button>${!ans?`<button class="btn btn-ghost" onclick="skipExam()">Passer</button>`:''} ${idx+1<COUNT?`<button class="btn btn-primary" onclick="jumpExam(${idx+1})">Suivante →</button>`:`<button class="btn btn-success" onclick="submitExam()">Terminer ✓</button>`}</div></div>`;
  };
  window.pickExam=(ci)=>{resumeAudio();answers[idx]=choices[idx][ci].text;render();};
  window.skipExam=()=>{answers[idx]='__skipped__';if(idx+1<COUNT)idx++;render();};
  window.jumpExam=(i)=>{idx=i;render();};
  window.submitExam=()=>{submitted=true;render();};
  render();
}
renderHome();

// Keyboard shortcuts (desktop uniquement)
if(!('ontouchstart' in window)){
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k = e.key;
  if(['1','2','3','4','5'].includes(k)){
    const ci = parseInt(k)-1;
    const btns = document.querySelectorAll('.choice-btn:not(:disabled)');
    if(btns[ci]) btns[ci].click();
  }
  if(k==='Enter'||k==='ArrowRight'||k===' '){
    e.preventDefault();
    const next = document.querySelector('[onclick="nextTrain()"]');
    if(next && !next.disabled){ next.click(); return; }
    const skip = document.querySelector('[onclick="skipExam()"]');
    if(skip && !skip.disabled) skip.click();
  }
});
}

</script>
</body>
</html>
